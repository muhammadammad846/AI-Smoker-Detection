[phases.setup]
nixPkgs = ["nodejs-18_x", "python310", "cmake", "gcc"]

[phases.install]
cmds = [
  "npm install",
  "curl https://bootstrap.pypa.io/get-pip.py -o get-pip.py && PIP_BREAK_SYSTEM_PACKAGES=1 python3 get-pip.py",
  "python3 -m pip install --break-system-packages -r requirements.txt"
]

[phases.build]
cmds = ["echo 'Build phase skipped - all dependencies installed in install phase'"]

[start]
cmd = "node server.js"
